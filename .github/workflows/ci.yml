name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同じブランチに続けて push したら、古い実行は打ち切る
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 読み取りだけで足りる
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action はタグではなくコミットハッシュで固定する。
      # タグは書き換え可能なので、リポジトリが乗っ取られると v7 が別のコミットを指しうる。
      # 末尾のコメントがバージョンの目印で、Dependabot はこれを見て更新 PR を出す。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint & Format (Biome)
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      # ビルドはテストでもある。
      # 日次レポートの frontmatter がスキーマに合わなければ InvalidContentEntryDataError で落ち、
      # posts が 0 件なら getPosts() のガードで落ちる（空のサイトを公開しない）。
      - name: Build (Astro)
        run: npm run build
