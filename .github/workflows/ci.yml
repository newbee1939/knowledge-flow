name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同じブランチに続けて push したら、古い実行は打ち切る
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 読み取りだけで足りる
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action はタグではなくコミットハッシュで固定する。
      # タグは書き換え可能なので、リポジトリが乗っ取られると v7 が別のコミットを指しうる。
      # 末尾のコメントがバージョンの目印で、Dependabot はこれを見て更新 PR を出す。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node のバージョンは .tool-versions が唯一の真実。
      # mise（ローカル）と setup-node（CI）の両方がこのファイルをそのまま読む。
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .tool-versions
          cache: npm

      - run: npm ci

      # rehype-mermaid はビルド時に Playwright Chromium で mermaid 図をインライン SVG に変換する
      # （ARCHITECTURE.md の落とし穴 4）。ブラウザバイナリは ~/.cache/ms-playwright にキャッシュし、
      # キャッシュヒット時はダウンロードをスキップする。OS の依存パッケージはランナーが毎回使い捨てなので
      # キャッシュの有無にかかわらず入れ直す（apt のみでダウンロードは発生しない）。
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --no-shell chromium

      - name: Install Playwright Chromium OS deps
        run: npx playwright install-deps chromium

      # Lint / Test / Build は互いに依存しないので並列実行する（steps-level parallel、2026-06-25〜）。
      # ビルドはテストでもある。
      # 日次レポートの frontmatter がスキーマに合わなければ InvalidContentEntryDataError で落ち、
      # posts が 0 件なら getPosts() のガードで落ちる（空のサイトを公開しない）。
      - parallel:
          - name: Lint & Format (Biome)
            run: npm run lint

          - name: Test (Vitest)
            run: npm test

          - name: Build (Astro)
            run: npm run build
