name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同じブランチに続けて push したら、古い実行は打ち切る
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 読み取りだけで足りる
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Action はタグではなくコミットハッシュで固定する。
      # タグは書き換え可能なので、リポジトリが乗っ取られると v7 が別のコミットを指しうる。
      # 末尾のコメントがバージョンの目印で、Dependabot はこれを見て更新 PR を出す。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node のバージョンは .tool-versions が唯一の真実。
      # mise（ローカル）と setup-node（CI）の両方がこのファイルをそのまま読む。
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .tool-versions
          cache: npm

      # rehype-mermaid はビルド時に Playwright Chromium で mermaid 図をインライン SVG に変換する
      # （ARCHITECTURE.md の落とし穴 4）。ブラウザバイナリは ~/.cache/ms-playwright にキャッシュする。
      # npm の postinstall（`playwright install --only-shell chromium`）が実際のダウンロードを担当し、
      # キャッシュヒット時はダウンロード済みと判定してスキップする。npm ci より前にキャッシュを復元する。
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      # OS の依存パッケージ（apt）はランナーが毎回使い捨てなのでキャッシュの有無にかかわらず入れ直す。
      # ブラウザ本体と違って大きなダウンロードは発生しない。
      - name: Install Playwright Chromium OS deps
        run: npx playwright install-deps chromium

      # Lint / Test / Build は互いに依存しないので並列実行する（steps-level parallel、2026-06-25〜）。
      # ビルドはテストでもある。
      # 日次レポートの frontmatter がスキーマに合わなければ InvalidContentEntryDataError で落ち、
      # posts が 0 件なら getPosts() のガードで落ちる（空のサイトを公開しない）。
      - parallel:
          - name: Lint & Format (Biome)
            run: npm run lint

          - name: Test (Vitest)
            run: npm test

          - name: Build (Astro)
            run: npm run build
