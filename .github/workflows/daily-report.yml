name: Daily Report

# 毎日深夜 02:00 JST に /daily-report Skill を実行し、当日のレポートを main へ push する（P3）。
# この push は GITHUB_TOKEN で行われるため push イベントとしては pages.yml を起動できない。
# pages.yml 側が本ワークフローの完了を workflow_run で直接受けて起動し、サイトが自動更新される（P3-4 の連鎖）。
on:
  schedule:
    # 02:00 JST = 前日 17:00 UTC。cron は UTC で書く（ARCHITECTURE.md の落とし穴 5）
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Claude GitHub App トークンの OIDC 交換に必要（下の claude-code-action のコメント参照）

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Tokyo # SKILL.md の「今日を JST で確定」を実行環境でも保証する（落とし穴 5）
    steps:
      # .claude/skills/ を Claude に読ませるため、先に checkout する
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # push はこのプロンプト経由でのみ行わせる。SKILL.md 自体は commit 止まりで固定し、
      # ローカルで /daily-report を手動実行しても main へ push されないようにする。
      #
      # 【claude-code-action に登場する 3 つのトークンの整理】役割は完全に別物で、混同しやすい:
      #   1. CLAUDE_CODE_OAUTH_TOKEN … Anthropic への認証。Claude（AI）を使う許可で、GitHub とは無関係
      #   2. Claude GitHub App のトークン … claude-code-action が GitHub API を叩くための許可証（コメント投稿など）。
      #      github_token 入力を渡さない標準構成では、claude-code-action が起動時に App から OIDC 交換で取得する。
      #      App 未インストールだとこの取得に失敗し、claude-code-action 自体が起動しない（起動の関門）
      #   3. GITHUB_TOKEN … GitHub がジョブごとに全ワークフローへ自動支給するトークン。
      #      actions/checkout が git 設定に認証情報として埋め込むため、
      #      Claude が Bash で実行する git push は（App のトークンではなく）これを使う
      #
      # つまり「App を入れたから push も App のトークンのはず」は誤り。push は 3 の GITHUB_TOKEN で行われ、
      # GITHUB_TOKEN による push は無限ループ防止の GitHub 仕様により他ワークフローの push トリガーを発火しない。
      # そのため pages.yml は on: push ではなく workflow_run で本ワークフローの完了を直接受けて起動する。
      - uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /daily-report を実行してください。
            完了したら、生成されたコミットを main ブランチへ直接 push してください（git push origin main）。
            claude/ プレフィックスのブランチは作らないでください。
            書き込み・コミットしてよいのは docs/ 配下のみです。src/ や .github/ など他の場所は変更しないでください。
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
            --model opus
