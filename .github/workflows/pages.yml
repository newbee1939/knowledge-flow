name: Deploy Pages

# main への push（人間の通常コミット）で Astro をビルドし、GitHub Pages へ公開する（P2-8）。
# 日次レポート（daily-report.yml）は GITHUB_TOKEN で push するため、
# GitHub の仕様上 push イベントとしてはこのワークフローを起動できない
# （GITHUB_TOKEN による push/PR は後続ワークフローの push/pull_request トリガーを発火しない）。
# そのため daily-report.yml の完了を workflow_run で直接受けて起動する。
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: [Daily Report]
    types: [completed]
    branches: [main]

# 公式スターターワークフロー（actions/starter-workflows の Pages 系）と同じ構成。
# id-token は deploy-pages の OIDC 検証に必要。
permissions:
  contents: read
  pages: write
  id-token: write

# デプロイは直列にする。進行中の実行はキャンセルしない（本番反映を取りこぼさない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # workflow_run 起動時は Daily Report が成功した場合だけビルドする（失敗コミットで壊れたサイトを公開しない）
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      # workflow_run 起動時の既定の checkout 対象（GITHUB_SHA）はデフォルトブランチの最新コミット。
      # Daily Report 完了後に発火するため、run の途中で push されたレポートコミットを含む。
      # `ref: workflow_run.head_sha` を指定してはいけない。head_sha は Daily Report の
      # run 作成時点の main の tip で固定されており、レポートのコミットを含まない。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node のバージョンは .tool-versions が唯一の真実（ci.yml と同じ）
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .tool-versions
          cache: npm

      # rehype-mermaid 用の Playwright Chromium キャッシュ（ci.yml と同じ構成）
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Install Playwright Chromium OS deps
        run: npx playwright install-deps chromium

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
